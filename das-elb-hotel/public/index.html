    /* ── Responsive layout: apply directly via JS to guarantee correct styles ── */
    function applyOwnerResponsive() {
      var section = document.getElementById('inhaber');
      if (!section) return;
      var grid     = section.querySelector('.ow-main-grid');
      var pCol     = section.querySelector('.ow-portrait-col');
      var pFrame   = section.querySelector('.ow-portrait-frame');
      var cCol     = section.querySelector('.ow-content-col');
      var ornTop   = section.querySelector('.ow-orn-top');
      var ornBot   = section.querySelector('.ow-orn-bot');
      if (!grid) return;

      var mobile = window.innerWidth <= 900;
      var small  = window.innerWidth <= 480;

      if (mobile) {
        grid.style.gridTemplateColumns = '1fr';
        grid.style.padding = small ? '32px 16px 50px' : '40px 24px 60px';
        grid.style.gap = '36px';
        if (pCol)   { pCol.style.paddingRight = '0'; pCol.style.width = '100%'; pCol.style.alignItems = 'center'; }
        if (pFrame) { pFrame.style.maxWidth = 'min(300px, 80vw)'; pFrame.style.width = '100%'; pFrame.style.margin = '0 auto'; }
        if (cCol)   { cCol.style.paddingLeft = '0'; cCol.style.width = '100%'; }
        if (ornTop) { ornTop.style.padding = '40px 24px 0'; }
        if (ornBot) { ornBot.style.padding = '0 24px 40px'; }
        /* Constrain portrait image height so it doesn't dominate on mobile */
        var img = section.querySelector('.ow-portrait-frame img');
        if (img) { img.style.maxHeight = '380px'; img.style.objectFit = 'cover'; }
        /* Name font size */
        var h2 = section.querySelector('.ow-content-col h2');
        if (h2) h2.style.fontSize = small ? 'clamp(1.8rem,10vw,2.2rem)' : 'clamp(2rem,8vw,2.8rem)';
        /* CTA row: wrap */
        var ctaRow = cCol ? cCol.querySelector('div:last-child') : null;
        if (ctaRow) { ctaRow.style.flexWrap = 'wrap'; if (small) ctaRow.style.flexDirection = 'column'; }
      } else {
        /* Reset to desktop */
        grid.style.gridTemplateColumns = '1fr 1fr';
        grid.style.padding = '60px 10% 80px';
        grid.style.gap = '0';
        if (pCol)   { pCol.style.paddingRight = '6%'; pCol.style.width = ''; pCol.style.alignItems = 'center'; }
        if (pFrame) { pFrame.style.maxWidth = ''; pFrame.style.width = ''; pFrame.style.margin = ''; }
        if (cCol)   { cCol.style.paddingLeft = '6%'; cCol.style.width = ''; }
        if (ornTop) { ornTop.style.padding = '60px 10% 0'; }
        if (ornBot) { ornBot.style.padding = '0 10% 60px'; }
        var img2 = section.querySelector('.ow-portrait-frame img');
        if (img2) { img2.style.maxHeight = ''; img2.style.objectFit = 'cover'; }
        var h2d = section.querySelector('.ow-content-col h2');
        if (h2d) h2d.style.fontSize = '';
      }
    }

    function injectOwner() {
      if (document.getElementById('inhaber')) return;
      var anchor = document.getElementById('stellenangebote') || document.getElementById('galerie');
      if (!anchor) return;
      anchor.parentNode.insertBefore(buildOwnerSection(), anchor.nextSibling);
      setTimeout(applyOwnerResponsive, 50);
    }

    window.addEventListener('resize', applyOwnerResponsive);

    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(injectOwner, 900);
    });
    var _ownerObs = new MutationObserver(function() {
      if (!document.getElementById('inhaber')) injectOwner();
    });
    document.addEventListener('DOMContentLoaded', function() {
      _ownerObs.observe(document.body, { childList: true, subtree: true });
    });
  })();
  </script>

  <script>
  (function() {
    var overlay  = document.getElementById('bew-overlay');
    var modal    = document.getElementById('bew-modal');
    var form     = document.getElementById('bew-form');
    var closeBtn = document.getElementById('bew-close');
    var fileInput= document.getElementById('bew-file-input');
    var fileLabel= document.getElementById('bew-file-label');
    var jobField = document.getElementById('bew-job-field');
    var titleEl  = document.getElementById('bew-title');
    var status   = document.getElementById('bew-status');
    var submitBtn= document.getElementById('bew-submit');
    var successSc= document.getElementById('bew-success-screen');
    var doneBtn  = document.getElementById('bew-done-btn');

    function openModal(jobTitle) {
      jobField.value = jobTitle || '';
      titleEl.textContent = jobTitle ? 'Bewerben: ' + jobTitle : 'Jetzt bewerben';
      form.style.display = 'flex';
      successSc.classList.remove('bew-show');
      status.className = '';
      status.textContent = '';
      form.reset();
      fileLabel.classList.remove('bew-has-file');
      fileLabel.querySelector('.bew-upload-main').textContent = 'Datei auswählen oder hier ablegen';
      overlay.classList.add('bew-open');
      document.body.style.overflow = 'hidden';
      setTimeout(function() {
        var first = form.querySelector('input:not([type=hidden])');
        if (first) first.focus();
      }, 100);
    }

    function closeModal() {
      overlay.classList.remove('bew-open');
      document.body.style.overflow = '';
    }

    closeBtn.addEventListener('click', closeModal);
    doneBtn.addEventListener('click', closeModal);
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) closeModal();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });

    /* File input label update */
    fileInput.addEventListener('change', function() {
      var f = fileInput.files[0];
      if (f) {
        fileLabel.classList.add('bew-has-file');
        var nameEl = fileLabel.querySelector('.bew-upload-main');
        nameEl.textContent = f.name;
        var subEl = fileLabel.querySelector('.bew-upload-sub');
        subEl.textContent = (f.size / 1024 / 1024).toFixed(1) + ' MB';
      } else {
        fileLabel.classList.remove('bew-has-file');
        fileLabel.querySelector('.bew-upload-main').textContent = 'Datei auswählen oder hier ablegen';
        fileLabel.querySelector('.bew-upload-sub').textContent = 'PDF, DOC, DOCX, JPG, PNG · max. 10 MB';
      }
    });

    /* Drag-and-drop on file label */
    fileLabel.addEventListener('dragover', function(e) { e.preventDefault(); fileLabel.style.borderColor = '#C5A059'; });
    fileLabel.addEventListener('dragleave', function() { fileLabel.style.borderColor = ''; });
    fileLabel.addEventListener('drop', function(e) {
      e.preventDefault();
      fileLabel.style.borderColor = '';
      var dt = e.dataTransfer;
      if (dt && dt.files && dt.files[0]) {
        fileInput.files = dt.files;
        fileInput.dispatchEvent(new Event('change'));
      }
    });

    /* Form submit */
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      status.className = '';
      status.textContent = '';

      var name  = form.querySelector('[name=name]').value.trim();
      var email = form.querySelector('[name=email]').value.trim();
      if (!name || !email) {
        status.className = 'bew-error';
        status.textContent = 'Bitte füllen Sie Name und E-Mail aus.';
        return;
      }

      var fd = new FormData(form);
      submitBtn.disabled = true;
      submitBtn.textContent = 'Wird gesendet …';

      fetch('/api/bewerben', { method: 'POST', body: fd })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.ok) {
            form.style.display = 'none';
            successSc.classList.add('bew-show');
          } else {
            status.className = 'bew-error';
            status.textContent = data.message || 'Fehler beim Senden. Bitte erneut versuchen.';
          }
        })
        .catch(function() {
          status.className = 'bew-error';
          status.textContent = 'Verbindungsfehler. Bitte prüfen Sie Ihre Internetverbindung.';
        })
        .finally(function() {
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Bewerbung absenden';
        });
    });

    /* Expose globally so card buttons can call it directly via onclick */
    window.openBewModal = openModal;
  })();
  </script>

  <script>
  /* ── SCROLL ENTRANCE ANIMATIONS ─────────────────────────────────────── */
  (function() {
    var ANIM_ATTR = 'data-reveal';

    /* Mark sections and key elements for reveal */
    function markRevealTargets() {
      var selectors = [
        '#stellenangebote .js-card',
        '#stellenangebote h2, #stellenangebote p',
        '.ow-main-grid > *',
        '#rooms-video-banner',
        '.js-contact-inner',
        '[data-room-card]',
        '[data-tag-card]',
        '[data-event-card]'
      ];
      selectors.forEach(function(sel) {
        try {
          document.querySelectorAll(sel).forEach(function(el) {
            if (!el.hasAttribute(ANIM_ATTR)) {
              el.setAttribute(ANIM_ATTR, 'fade-up');
            }
          });
        } catch(e) {}
      });
    }

    /* Intersection Observer for reveals */
    var revealIO = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('revealed');
          revealIO.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });

    function observeRevealTargets() {
      document.querySelectorAll('[' + ANIM_ATTR + ']').forEach(function(el) {
        revealIO.observe(el);
      });
    }

    /* Run on DOM ready and re-run as new content is injected */
    var _animObs = new MutationObserver(function() {
      markRevealTargets();
      observeRevealTargets();
    });

    function initAnims() {
      markRevealTargets();
      observeRevealTargets();
      _animObs.observe(document.body, { childList: true, subtree: true });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initAnims);
    } else {
      initAnims();
    }
  })();

        el.style.setProperty('background', 'none', 'important');
        el.style.setProperty('filter', 'none', 'important');
        el.style.setProperty('text-shadow', 'none', 'important');
      });

      var paras = card.querySelectorAll('p, li, .card-subtitle');
      paras.forEach(function(el) {
        if (!el.classList.contains('card-price')) {
          el.style.setProperty('color', 'rgba(15,46,35,0.72)', 'important');
          el.style.setProperty('text-shadow', 'none', 'important');
        }
      });

      var prices = card.querySelectorAll('.card-price');
      prices.forEach(function(el) {
        el.style.setProperty('color', '#C5A059', 'important');
        el.style.setProperty('-webkit-text-fill-color', '#C5A059', 'important');
      });

      /* 4. All spans: dark green */
      var spans = card.querySelectorAll('span:not(.card-price *)');
      spans.forEach(function(el) {
        var cls = el.className || '';
        if (cls.indexOf('card-price') < 0) {
          el.style.setProperty('color', 'rgba(15,46,35,0.65)', 'important');
          el.style.setProperty('-webkit-text-fill-color', 'rgba(15,46,35,0.65)', 'important');
        }
      });

      /* 5. Book buttons: dark green bg, white text */
      var btns = card.querySelectorAll('button, [role="button"]');
      btns.forEach(function(btn) {
        btn.style.setProperty('background', '#0F2E23', 'important');
        btn.style.setProperty('border-color', '#0F2E23', 'important');
        btn.style.setProperty('color', '#fff', 'important');
        var children = btn.querySelectorAll('span, svg');
        children.forEach(function(ch) {
          ch.style.setProperty('color', '#fff', 'important');
          ch.style.setProperty('-webkit-text-fill-color', '#fff', 'important');
        });
      });
    });
    return true;
  }

  function run() {
    patchRoomCards();
    /* Re-run when React swaps card state */
    var obs = new MutationObserver(function() { patchRoomCards(); });
    var section = document.getElementById('rooms-view');
    if (section) obs.observe(section, { childList: true, subtree: true, attributes: true });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() { setTimeout(run, 800); });
  } else {
    setTimeout(run, 800);
  }
})();
</script>
</body></html>
