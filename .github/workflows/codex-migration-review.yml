name: Codex Migration Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - backend/alembic/**
      - backend/app/**/models.py

permissions:
  contents: read

jobs:
  codex:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Pre-fetch base and head refs
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Run Codex migration review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          prompt: |
            Review ONLY the migration and model changes introduced by PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            Focus on:
            - Alembic safety and idempotency
            - backward compatibility during rolling deploys
            - tenant isolation or cross-domain data drift risk
            - required operator steps before staging or production
            - rollback concerns if the migration partially applies

            Compare the PR range:
            git log --oneline ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}

            Be concise and structured with:
            1. Findings
            2. Rollout Notes
            3. No Issues

  report:
    if: ${{ needs.codex.outputs.final_message != '' }}
    runs-on: ubuntu-latest
    needs: codex
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Post Codex review comment
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
