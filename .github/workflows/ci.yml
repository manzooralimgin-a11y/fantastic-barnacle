# =============================================================================
# Das Elb — Monorepo CI Entry Pipeline
# =============================================================================
# This is the root pipeline. It:
#   1. Runs the content guard (fast static checks, no setup needed)
#   2. Loads the app matrix from apps.json
#   3. Calls reusable-ci.yml for EVERY app in the matrix
#   4. Runs contract validation against the live backend schema
#   5. Acts as a deployment gate — deploy only if ALL jobs pass
#
# To add a new app: edit apps.json. No changes to this file needed.
#
# To run locally (approximate):
#   bash scripts/check-content.sh
#   cd <app> && npm ci && npm run lint && npm run build && npm test
# =============================================================================

name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# =============================================================================
# Job 1 — Content Guard
# Fast static scan — no language runtime setup needed.
# Checks for forbidden strings before spending time on builds.
# =============================================================================
jobs:
  content-guard:
    name: Content Guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Scan for forbidden content
        run: bash scripts/check-content.sh

  # ===========================================================================
  # Job 2 — Load app matrix from apps.json
  # This makes "adding a new app" a one-line change in apps.json.
  # ===========================================================================
  load-matrix:
    name: Load App Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.read.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Read apps.json
        id: read
        run: |
          # apps.json must be valid JSON with an "include" array
          python3 -c "
          import json, sys
          with open('apps.json') as f:
              data = json.load(f)
          # Validate structure
          assert 'include' in data, 'apps.json must have an \"include\" key'
          assert len(data['include']) > 0, 'apps.json must have at least one app'
          for app in data['include']:
              assert 'app_name' in app, f'Each app entry must have app_name: {app}'
              assert 'app_path' in app, f'Each app entry must have app_path: {app}'
              assert 'runtime' in app, f'Each app entry must have runtime: {app}'
          print(f'✓ apps.json valid — {len(data[\"include\"])} apps registered')
          "
          echo "matrix=$(cat apps.json)" >> $GITHUB_OUTPUT

  # ===========================================================================
  # Job 3 — Per-app CI (runs reusable-ci.yml for each app in the matrix)
  # ===========================================================================
  app-ci:
    name: "${{ matrix.app_name }}"
    needs: [content-guard, load-matrix]
    strategy:
      matrix: ${{ fromJson(needs.load-matrix.outputs.matrix) }}
      fail-fast: false  # Run all apps even if one fails — get full picture
    uses: ./.github/workflows/reusable-ci.yml
    with:
      app_name: ${{ matrix.app_name }}
      app_path: ${{ matrix.app_path }}
      runtime: ${{ matrix.runtime }}
      node_version: ${{ matrix.node_version || '22' }}
      python_version: ${{ matrix.python_version || '3.12' }}
      lint_command: ${{ matrix.lint_command || '' }}
      typecheck_command: ${{ matrix.typecheck_command || '' }}
      build_command: ${{ matrix.build_command || '' }}
      test_command: ${{ matrix.test_command || '' }}
      e2e_command: ${{ matrix.e2e_command || '' }}

  # ===========================================================================
  # Job 4 — API Contract Validation
  # Verifies that the LIVE production backend still matches our contract schemas.
  # Runs AFTER the per-app CI so we don't hit prod unnecessarily on broken builds.
  # ===========================================================================
  contract-validation:
    name: API Contract Validation
    needs: [app-ci]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install contract dependencies
        working-directory: packages/contracts
        run: npm install

      - name: Validate error response contracts
        env:
          API_BASE_URL: https://gestronomy-api-5atv.onrender.com/api
        run: node scripts/run-contract-tests.mjs

  # ===========================================================================
  # Job 5 — Security Scanning
  # Runs in parallel with app-ci (doesn't need to wait for it).
  # ===========================================================================
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [content-guard]
    steps:
      - uses: actions/checkout@v4

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Audit Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "backend[dev]" pip-audit
          pip-audit --ignore-vuln GHSA-753j-mpmx-qq6g || true
          # ↑ ignore known false positive in test-only dep; remove when fixed upstream

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Audit frontend production dependencies
        working-directory: frontend
        run: |
          npm ci
          npm audit --omit=dev --audit-level=critical

      - name: Audit hotel-owner production dependencies
        working-directory: hotel-owner
        run: |
          npm ci --legacy-peer-deps
          npm audit --omit=dev --audit-level=critical

      - name: Audit hotel-guest production dependencies
        working-directory: hotel-guest
        run: |
          npm ci
          npm audit --omit=dev --audit-level=critical

  # ===========================================================================
  # Job 6 — Docker Build Checks
  # Verifies that every service's Docker image can be built successfully.
  # ===========================================================================
  docker-builds:
    name: Docker Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [content-guard]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            dockerfile: backend/Dockerfile
            context: backend
            build_args: ""
          - service: frontend
            dockerfile: frontend/Dockerfile
            context: frontend
            build_args: "NEXT_PUBLIC_API_URL=https://gestronomy-api-5atv.onrender.com/api"
          - service: hotel-guest
            dockerfile: hotel-guest/Dockerfile
            context: hotel-guest
            build_args: "VITE_API_BASE_URL=https://gestronomy-api-5atv.onrender.com/api/v1"
          - service: hotel-owner
            dockerfile: hotel-owner/Dockerfile
            context: hotel-owner
            build_args: "NEXT_PUBLIC_API_URL=https://gestronomy-api-5atv.onrender.com/api"
          - service: res-web
            dockerfile: res-web/Dockerfile
            context: res-web
            build_args: "VITE_PUBLIC_API_BASE_URL=https://gestronomy-api-5atv.onrender.com/api VITE_RESTAURANT_ID=4240"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: das-elb/${{ matrix.service }}:ci
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  # ===========================================================================
  # Job 7 — Deployment Gate
  # This job ONLY passes if every other job passes.
  # The deploy.yml workflow depends on this job — if it fails, no deployment.
  # =============================================================================
  deployment-gate:
    name: Deployment Gate
    runs-on: ubuntu-latest
    needs:
      - content-guard
      - app-ci
      - contract-validation
      - security
      - docker-builds
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          echo "Content Guard:        ${{ needs.content-guard.result }}"
          echo "App CI (matrix):      ${{ needs.app-ci.result }}"
          echo "Contract Validation:  ${{ needs.contract-validation.result }}"
          echo "Security Scan:        ${{ needs.security.result }}"
          echo "Docker Builds:        ${{ needs.docker-builds.result }}"

          # Fail if any required job did not succeed
          for result in \
            "${{ needs.content-guard.result }}" \
            "${{ needs.app-ci.result }}" \
            "${{ needs.contract-validation.result }}" \
            "${{ needs.security.result }}" \
            "${{ needs.docker-builds.result }}"
          do
            if [ "$result" != "success" ]; then
              echo ""
              echo "✗ One or more CI jobs failed. Deployment is BLOCKED."
              echo "  Fix all failures above before this branch can be deployed."
              exit 1
            fi
          done

          echo ""
          echo "✓ All CI checks passed. Deployment is ALLOWED."
