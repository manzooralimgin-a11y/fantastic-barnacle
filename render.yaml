# Render Blueprint — one-hotel MG ecosystem

databases:
  - name: gestronomy-db
    plan: free
    databaseName: gestronomy
    user: gestronomy
    ipAllowList: []

services:
  - type: web
    name: gestronomy-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gestronomy-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: gestronomy-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: gestronomy-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: gestronomy-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: RUN_MIGRATIONS
        value: "1"
      - key: RUN_MASTER_SEED
        value: "0"
      - key: STARTUP_VALIDATION_REQUIRE_MIGRATIONS
        value: "true"
      - key: BACKEND_URL
        value: https://gestronomy-api-5atv.onrender.com
      - key: FRONTEND_URL
        value: https://gestronomy-web-ipjw.onrender.com
      - key: CORS_ORIGINS
        value: https://gestronomy-web-ipjw.onrender.com,https://gestronomy-guest.onrender.com,https://hotel-guest.onrender.com,https://hotel-owner.onrender.com,https://waiter-web.onrender.com,https://www.zukunftwebs.com,https://zukunftwebs.com,https://das-elb-hotel.onrender.com,http://localhost:3000,http://localhost:3001,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:3001,http://127.0.0.1:5173
      - key: VOICEBOOKER_SECRET
        sync: false
      - key: EMAIL_INBOX_INGEST_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: STRIPE_API_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  - type: background_worker
    name: gestronomy-worker
    runtime: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: ./start-worker.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gestronomy-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: gestronomy-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: gestronomy-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: gestronomy-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: BACKEND_URL
        value: https://gestronomy-api-5atv.onrender.com
      - key: FRONTEND_URL
        value: https://gestronomy-web-ipjw.onrender.com
      - key: VOICEBOOKER_SECRET
        sync: false
      - key: EMAIL_INBOX_INGEST_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: STRIPE_API_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  - type: background_worker
    name: gestronomy-beat
    runtime: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: ./start-beat.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gestronomy-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: gestronomy-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: gestronomy-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: gestronomy-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: BACKEND_URL
        value: https://gestronomy-api-5atv.onrender.com
      - key: FRONTEND_URL
        value: https://gestronomy-web-ipjw.onrender.com
      - key: VOICEBOOKER_SECRET
        sync: false
      - key: EMAIL_INBOX_INGEST_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: STRIPE_API_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  - type: web
    name: gestronomy-web
    runtime: docker
    plan: starter
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    buildArgs:
      - key: NEXT_PUBLIC_API_URL
        value: https://gestronomy-api-5atv.onrender.com/api
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://gestronomy-api-5atv.onrender.com/api
      - key: BACKEND_URL
        value: https://gestronomy-api-5atv.onrender.com

  - type: web
    name: gestronomy-guest
    runtime: docker
    plan: free
    dockerfilePath: ./res-web/Dockerfile
    dockerContext: ./res-web
    envVars:
      - key: VITE_PUBLIC_API_BASE_URL
        value: https://gestronomy-api-5atv.onrender.com/api
      - key: VITE_RESTAURANT_ID
        value: "4240"

  - type: web
    name: das-elb-hotel
    runtime: docker
    plan: starter
    dockerfilePath: ./das-elb-hotel-optimised/Dockerfile
    dockerContext: ./das-elb-hotel-optimised
    healthCheckPath: /health
    envVars:
      - key: PUBLIC_API_BASE_URL
        value: https://gestronomy-api-5atv.onrender.com/api
      - key: PUBLIC_SITE_URL
        value: https://www.das-elb-hotel.com
      - key: RESEND_API_KEY
        sync: false

  # Hotel Guest App — Vite+React self-service portal for hotel guests
  - type: web
    name: hotel-guest
    runtime: docker
    plan: free
    dockerfilePath: ./hotel-guest/Dockerfile
    dockerContext: ./hotel-guest
    buildArgs:
      - key: VITE_API_BASE_URL
        value: https://gestronomy-api-5atv.onrender.com/api
    envVars:
      - key: VITE_API_BASE_URL
        value: https://gestronomy-api-5atv.onrender.com/api

  # Hotel Owner App — Next.js analytics & property management dashboard
  - type: web
    name: hotel-owner
    runtime: docker
    plan: free
    dockerfilePath: ./hotel-owner/Dockerfile
    dockerContext: ./hotel-owner
    buildArgs:
      - key: NEXT_PUBLIC_API_URL
        value: https://gestronomy-api-5atv.onrender.com/api
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://gestronomy-api-5atv.onrender.com/api

  # Waiter Web — Vite+React restaurant waiter console (replaces SwiftUI
  # WaiterApp for browser-based production testing).
  - type: web
    name: waiter-web
    runtime: docker
    plan: free
    dockerfilePath: ./waiter-web/Dockerfile
    dockerContext: ./waiter-web
    buildArgs:
      - key: VITE_API_BASE_URL
        value: https://gestronomy-api-5atv.onrender.com/api
    envVars:
      - key: VITE_API_BASE_URL
        value: https://gestronomy-api-5atv.onrender.com/api

  - type: redis
    name: gestronomy-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
