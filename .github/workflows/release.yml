name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        type: choice
        required: true
        default: staging
        options:
          - staging
          - production
      release_ref:
        description: Git ref (tag, branch, or SHA) to deploy
        required: true
        default: main
      run_migrations:
        description: Apply Alembic migrations before deploying
        type: boolean
        required: true
        default: true

permissions:
  contents: read
  deployments: write

concurrency:
  group: release-${{ github.event_name == 'push' && 'staging' || inputs.environment }}
  cancel-in-progress: false

env:
  RELEASE_ENVIRONMENT: ${{ github.event_name == 'push' && 'staging' || inputs.environment }}
  RELEASE_REF: ${{ github.event_name == 'push' && github.sha || inputs.release_ref }}

jobs:
  release-manifest:
    name: Create Release Manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Write release manifest
        run: |
          mkdir -p artifacts
          printf '%s\n' '{' > artifacts/release-manifest.json
          printf '  "environment": "%s",\n' "${RELEASE_ENVIRONMENT}" >> artifacts/release-manifest.json
          printf '  "release_ref": "%s",\n' "${RELEASE_REF}" >> artifacts/release-manifest.json
          printf '  "backend": "backend",\n' >> artifacts/release-manifest.json
          printf '  "saas": "frontend",\n' >> artifacts/release-manifest.json
          printf '  "landing": "das-elb-hotel",\n' >> artifacts/release-manifest.json
          printf '  "restaurant_guest": "das-elb-rest",\n' >> artifacts/release-manifest.json
          printf '  "mobile": "das-elb-mobile",\n' >> artifacts/release-manifest.json
          printf '  "generated_at": "%s"\n' "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> artifacts/release-manifest.json
          printf '%s\n' '}' >> artifacts/release-manifest.json

      - uses: actions/upload-artifact@v4
        with:
          name: release-manifest-${{ env.RELEASE_ENVIRONMENT }}
          path: artifacts/release-manifest.json

  deploy:
    name: Deploy Release
    runs-on: ubuntu-latest
    needs:
      - release-manifest
    environment: ${{ env.RELEASE_ENVIRONMENT }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "backend[dev]"

      - name: Apply production/staging migrations
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.run_migrations) }}
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          CELERY_BROKER_URL: ${{ secrets.REDIS_URL }}
          CELERY_RESULT_BACKEND: ${{ secrets.REDIS_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          APP_ENV: ${{ env.RELEASE_ENVIRONMENT }}
          DEBUG: "false"
        run: alembic upgrade head

      - name: Trigger application deployments
        env:
          DEPLOY_ENVIRONMENT: ${{ env.RELEASE_ENVIRONMENT }}
          RELEASE_REF: ${{ env.RELEASE_REF }}
          DEPLOY_PROVIDER: ${{ secrets.DEPLOY_PROVIDER }}
          BACKEND_DEPLOY_HOOK_URL: ${{ secrets.BACKEND_DEPLOY_HOOK_URL }}
          SAAS_DEPLOY_HOOK_URL: ${{ secrets.SAAS_DEPLOY_HOOK_URL }}
          HOTEL_SITE_DEPLOY_HOOK_URL: ${{ secrets.HOTEL_SITE_DEPLOY_HOOK_URL }}
          RESTAURANT_GUEST_DEPLOY_HOOK_URL: ${{ secrets.RESTAURANT_GUEST_DEPLOY_HOOK_URL }}
        run: bash scripts/ci/provider-deploy.sh "${RELEASE_ENVIRONMENT}"

      - name: Post-deploy smoke checks
        env:
          API_HEALTHCHECK_URL: ${{ secrets.API_HEALTHCHECK_URL }}
          SAAS_HEALTHCHECK_URL: ${{ secrets.SAAS_HEALTHCHECK_URL }}
          HOTEL_HEALTHCHECK_URL: ${{ secrets.HOTEL_HEALTHCHECK_URL }}
          RESTAURANT_GUEST_HEALTHCHECK_URL: ${{ secrets.RESTAURANT_GUEST_HEALTHCHECK_URL }}
        run: bash scripts/ci/smoke-check.sh

      - name: Mobile release note
        run: echo "Mobile deployment remains store-driven; this workflow validates and coordinates server-side release only."
