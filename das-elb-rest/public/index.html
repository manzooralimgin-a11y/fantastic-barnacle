<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DAS ELB Restaurant</title>
    <style>
      :root {
        --bg: #09101b;
        --panel: #132133;
        --line: rgba(255, 255, 255, 0.12);
        --text: #f7efe3;
        --muted: #c5b7a1;
        --accent: #d7a84a;
        --accent-dark: #a97a1f;
        --success: #4ade80;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: "DM Sans", system-ui, sans-serif; background: radial-gradient(circle at top, #1b2f45, var(--bg) 55%); color: var(--text); }
      header, main { width: min(1100px, calc(100% - 32px)); margin: 0 auto; }
      header { padding: 40px 0 24px; }
      h1, h2 { font-family: Georgia, serif; margin: 0 0 12px; }
      p { color: var(--muted); line-height: 1.6; }
      .grid { display: grid; gap: 20px; grid-template-columns: 1.2fr 1fr; padding-bottom: 40px; }
      .panel { background: rgba(19,33,51,0.92); border: 1px solid var(--line); border-radius: 20px; padding: 20px; box-shadow: 0 24px 80px rgba(0,0,0,0.32); }
      .controls, .cart-items, .menu-list { display: grid; gap: 14px; }
      label { display: grid; gap: 8px; font-size: 0.92rem; color: var(--muted); }
      input, button, textarea { font: inherit; }
      input, textarea { width: 100%; border: 1px solid var(--line); border-radius: 12px; background: rgba(255,255,255,0.04); color: var(--text); padding: 12px 14px; }
      button { border: 0; border-radius: 999px; padding: 12px 18px; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #1d1402; font-weight: 700; cursor: pointer; }
      button.secondary { background: rgba(255,255,255,0.08); color: var(--text); }
      .menu-card, .cart-row { border: 1px solid var(--line); border-radius: 16px; padding: 16px; }
      .menu-card { display: grid; gap: 10px; }
      .price { color: var(--accent); font-weight: 700; }
      .row { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
      .muted { color: var(--muted); font-size: 0.9rem; }
      .pill { display: inline-flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,0.06); color: var(--muted); font-size: 0.9rem; }
      .status { min-height: 24px; color: var(--success); font-weight: 600; }
      @media (max-width: 840px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <header>
      <div class="pill">Live API: <span id="api-url">https://gestronomy-api.onrender.com</span></div>
      <h1>DAS ELB Restaurant</h1>
      <p>Browse the live menu, identify the table via QR/table code, and send orders straight into the kitchen and table management flow.</p>
    </header>
    <main class="grid">
      <section class="panel">
        <h2>Guest Order</h2>
        <div class="controls">
          <label>
            Table code
            <input id="table-code" placeholder="Paste QR/table code" />
          </label>
          <label>
            Guest name
            <input id="guest-name" value="Restaurant Guest" />
          </label>
          <button id="load-table" class="secondary" type="button">Load table + menu</button>
          <div class="muted" id="table-info">No table loaded yet.</div>
          <div id="menu" class="menu-list"></div>
        </div>
      </section>
      <aside class="panel">
        <h2>Current Cart</h2>
        <div id="cart-items" class="cart-items"></div>
        <div class="row">
          <span>Total</span>
          <strong class="price" id="cart-total">EUR 0.00</strong>
        </div>
        <label>
          Order notes
          <textarea id="order-notes" rows="3" placeholder="Allergies, timing, special requests"></textarea>
        </label>
        <button id="submit-order" type="button">Send order to kitchen</button>
        <div class="status" id="order-status"></div>
      </aside>
    </main>
    <script>
      const API_BASE = "https://gestronomy-api.onrender.com";
      const state = { menu: [], cart: [] };
      const menuRoot = document.getElementById("menu");
      const cartRoot = document.getElementById("cart-items");
      const cartTotal = document.getElementById("cart-total");
      const tableInfo = document.getElementById("table-info");
      const orderStatus = document.getElementById("order-status");

      function renderCart() {
        if (!state.cart.length) {
          cartRoot.innerHTML = '<div class="muted">No items selected yet.</div>';
          cartTotal.textContent = 'EUR 0.00';
          return;
        }
        cartRoot.innerHTML = state.cart.map((item, index) => `
          <div class="cart-row">
            <div>
              <strong>${item.name}</strong>
              <div class="muted">Qty ${item.quantity}</div>
            </div>
            <div class="row">
              <span class="price">EUR ${(item.unit_price * item.quantity).toFixed(2)}</span>
              <button class="secondary" type="button" onclick="window.removeCartItem(${index})">Remove</button>
            </div>
          </div>
        `).join("");
        const total = state.cart.reduce((sum, item) => sum + item.unit_price * item.quantity, 0);
        cartTotal.textContent = `EUR ${total.toFixed(2)}`;
      }

      function renderMenu() {
        if (!state.menu.length) {
          menuRoot.innerHTML = '<div class="muted">Load a table to fetch the live menu.</div>';
          return;
        }
        menuRoot.innerHTML = state.menu.map((category) => `
          <div class="panel" style="padding:16px">
            <h3>${category.name}</h3>
            ${category.items.map((item) => `
              <div class="menu-card">
                <div class="row">
                  <strong>${item.name}</strong>
                  <span class="price">EUR ${Number(item.price).toFixed(2)}</span>
                </div>
                <div class="muted">${item.description || "Chef special."}</div>
                <button type="button" onclick='window.addMenuItem(${JSON.stringify(item).replace(/'/g, "&apos;")})'>Add to order</button>
              </div>
            `).join("")}
          </div>
        `).join("");
      }

      window.addMenuItem = (item) => {
        const existing = state.cart.find((entry) => entry.menu_item_id === item.id);
        if (existing) {
          existing.quantity += 1;
        } else {
          state.cart.push({
            menu_item_id: item.id,
            name: item.name,
            quantity: 1,
            unit_price: Number(item.price),
          });
        }
        renderCart();
      };

      window.removeCartItem = (index) => {
        state.cart.splice(index, 1);
        renderCart();
      };

      async function loadMenu() {
        const response = await fetch(`${API_BASE}/api/public/restaurant/menu`);
        if (!response.ok) throw new Error("Menu unavailable");
        const data = await response.json();
        state.menu = data.categories || [];
        renderMenu();
      }

      async function loadTable() {
        orderStatus.textContent = '';
        const code = document.getElementById("table-code").value.trim();
        if (!code) {
          tableInfo.textContent = 'Please enter a table code first.';
          return;
        }
        const response = await fetch(`${API_BASE}/api/public/restaurant/table/${encodeURIComponent(code)}`);
        if (!response.ok) {
          tableInfo.textContent = 'Table lookup failed. Check the code and try again.';
          return;
        }
        const data = await response.json();
        tableInfo.textContent = `Table ${data.table_number} · ${data.section_name} · capacity ${data.capacity}`;
        await loadMenu();
      }

      async function submitOrder() {
        const tableCode = document.getElementById("table-code").value.trim();
        const guestName = document.getElementById("guest-name").value.trim() || "Restaurant Guest";
        const notes = document.getElementById("order-notes").value.trim();
        if (!tableCode || !state.cart.length) {
          orderStatus.textContent = 'Load a table and add at least one item first.';
          return;
        }
        const response = await fetch(`${API_BASE}/api/public/restaurant/order`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            table_code: tableCode,
            guest_name: guestName,
            notes,
            items: state.cart.map(({ menu_item_id, quantity }) => ({ menu_item_id, quantity })),
          }),
        });
        const data = await response.json();
        if (!response.ok) {
          orderStatus.textContent = data.detail || 'Order submission failed.';
          return;
        }
        orderStatus.textContent = `Order #${data.order_id} sent. Kitchen and table screens should update now.`;
        state.cart = [];
        renderCart();
      }

      document.getElementById("load-table").addEventListener("click", () => loadTable().catch((error) => {
        console.error(error);
        tableInfo.textContent = 'Unable to load the table or menu.';
      }));
      document.getElementById("submit-order").addEventListener("click", () => submitOrder().catch((error) => {
        console.error(error);
        orderStatus.textContent = 'Unexpected error while sending the order.';
      }));

      renderMenu();
      renderCart();
    </script>
  </body>
</html>
