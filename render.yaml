# Render Blueprint — Gestronomy Full Ecosystem
# https://render.com/docs/blueprint-spec

databases:
  - name: gestronomy-db
    plan: free
    databaseName: gestronomy
    user: gestronomy
    ipAllowList: []

services:
  # --- Backend API ---
  - type: web
    name: gestronomy-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gestronomy-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: gestronomy-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: https://gestronomy-web.onrender.com,https://das-elb-hotel.onrender.com,https://das-elb-rest.onrender.com
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_API_KEY
        sync: false
      - key: CELERY_BROKER_URL
        fromService:
          name: gestronomy-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: gestronomy-redis
          type: redis
          property: connectionString

  # --- Main Management Web App ---
  - type: web
    name: gestronomy-web
    runtime: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://gestronomy-api.onrender.com

  # --- Das Elb Hotel (Landing/Public) ---
  - type: web
    name: das-elb-hotel
    runtime: docker
    plan: free
    dockerfilePath: ./das-elb-hotel/Dockerfile
    dockerContext: ./das-elb-hotel
    envVars:
      - key: PUBLIC_API_BASE_URL
        value: https://gestronomy-api.onrender.com/api

  # --- Das Elb Rest (QR App/Direct Order) ---
  - type: web
    name: das-elb-rest
    runtime: docker
    plan: free
    dockerfilePath: ./das-elb-rest/Dockerfile
    dockerContext: ./das-elb-rest
    envVars:
      - key: VITE_API_URL
        value: https://gestronomy-api.onrender.com
      - key: VITE_RESTAURANT_ID
        sync: false

  # --- Redis (Shared) ---
  - type: redis
    name: gestronomy-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
